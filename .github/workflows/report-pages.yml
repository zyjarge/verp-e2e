name: Deploy Playwright Report to Pages

on:
  workflow_run:
    workflows: ["E2E (Playwright)"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 从 gh-pages 拉历史 runs（如果有），新增本次的
      - name: 检出 gh-pages 分支历史
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 下载本次 run 的 artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          run-number: ${{ github.event.workflow_run.run_number }}

      - name: 拼装站点结构
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"

          mkdir -p site/runs
          mkdir -p "site/runs/${RUN_ID}"

          # artifact 解压后结构是 report/playwright-report/... 和 report/test-results/...
          # 把 playwright-report 下的内容直接铺到 runs/<id>/，让 index.html 落在期望位置
          if [ -d report/playwright-report ]; then
            cp -r report/playwright-report/. "site/runs/${RUN_ID}/"
          fi
          if [ -d report/test-results ]; then
            mkdir -p "site/runs/${RUN_ID}/test-results"
            cp -r report/test-results/. "site/runs/${RUN_ID}/test-results/"
          fi

          # 索引页
          cat > site/index.html <<'HEADER'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Verp E2E Reports</title>
          <style>body{font-family:sans-serif;max-width:900px;margin:40px auto;padding:0 20px}
          table{border-collapse:collapse;width:100%}
          td,th{border:1px solid #ddd;padding:8px;text-align:left}
          a{color:#1d76db}</style></head><body>
          <h1>Verp E2E Reports</h1>
          <p>每次 E2E workflow 跑完会自动部署到这里。issue 里的链接格式：<code>https://zyjarge.github.io/verp-e2e/runs/&lt;run-id&gt;/</code></p>
          <table><thead><tr><th>Run</th><th>Report</th></tr></thead><tbody>
          HEADER

          for d in site/runs/*/; do
            [ -d "$d" ] || continue
            RID=$(basename "$d")
            echo "<tr><td>${RID}</td><td><a href='runs/${RID}/'>open report</a></td></tr>" >> site/index.html
          done

          cat >> site/index.html <<'FOOTER'
          </tbody></table></body></html>
          FOOTER

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传整站到 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4