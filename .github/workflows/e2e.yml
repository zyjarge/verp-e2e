name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VERP_WEB_URL: ${{ secrets.VERP_WEB_URL }}
      VERP_E2E_USER: ${{ secrets.VERP_E2E_USER }}
      VERP_E2E_PASSWORD: ${{ secrets.VERP_E2E_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 跑 Playwright
        id: playwright
        run: npx playwright test

      - name: 上传报告（失败也上传）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14

      # 失败 → 自动开/更新 Issue
      # 设计：
      #   - 只在 push main + workflow 失败时执行（PR 失败不开 issue）
      #   - 按 commit SHA 7 位前缀去重：找到 → comment，未找到 → 新建
      #   - 智能标签：bug + e2e；含 Timeout 加 flaky
      #   - issue body 链到 report-pages.yml 部署的报告
      - name: 失败 → 自动开/更新 Issue
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const pagesBase = `https://${owner}.github.io/${repo}/runs/${runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            const fs = require('fs');
            const path = require('path');

            const lastRun = JSON.parse(
              fs.readFileSync('test-results/.last-run.json', 'utf8'),
            );
            if (!lastRun || lastRun.status !== 'failed') {
              console.log('没有失败测试，跳过开 issue');
              return;
            }

            // 收集所有失败 spec 的 test-failed-*.png
            const screenshots = [];
            function walk(dir) {
              if (!fs.existsSync(dir)) return;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walk(full);
                } else if (/^test-failed-\d+\.png$/.test(entry.name)) {
                  screenshots.push(full);
                }
              }
            }
            walk('test-results');
            console.log(`[issue] 找到 ${screenshots.length} 张失败截图`);

            // 用 jobs API 汇总错误信息
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              { owner, repo, run_id: runId },
            );
            const failedJobs = jobs.filter((j) => j.conclusion === 'failure');
            let errorSummary = '';
            for (const job of failedJobs) {
              const annotations = await github.paginate(
                github.rest.checks.listAnnotations,
                { owner, repo, check_run_id: job.id },
              );
              for (const a of annotations) {
                if (a.level === 'failure') {
                  errorSummary += `\n- \`${a.path}\` @ L${a.start_line}: ${a.message}\n`;
                }
              }
            }

            const labels = ['bug', 'e2e'];
            if (/Timeout/i.test(errorSummary)) labels.push('flaky');

            const issueTitle = `❌ E2E failed on main @ ${commitSha.slice(0, 7)}`;

            // 构造 issue body（先不带截图，拿到 issue_number 再补）
            let issueBody = [
              `**Failed in**: workflow run #${runId}`,
              `**Commit**: \`${commitSha}\``,
              `**Run URL**: ${runUrl}`,
              ``,
              `### Failures`,
              errorSummary || '(详见 HTML 报告)',
              ``,
              `### Report`,
              `📊 HTML 报告 (含 trace / 截图): ${pagesBase}/`,
              `📦 原始 artifact: ${artifactUrl}`,
              ``,
              `### Repro`,
              `1. clone @ \`${commitSha}\``,
              `2. \`npm ci && npx playwright install --with-deps chromium\``,
              `3. 设置 env: VERP_WEB_URL / VERP_E2E_USER / VERP_E2E_PASSWORD`,
              `4. \`npm test\``,
              ``,
              `> 注：HTML 报告由 report-pages workflow 异步部署，可能延迟 1-2 分钟`,
            ].join('\n');

            // 去重
            const openIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', labels: 'e2e', per_page: 50 },
            );
            const existing = openIssues.find((i) =>
              i.title.includes(commitSha.slice(0, 7)),
            );

            // 工具：上传 PNG 到 issue（GitHub Media API 要求 raw binary，不是 JSON）
            async function uploadScreenshot(issueN, pngPath) {
              const content = fs.readFileSync(pngPath);
              const token = process.env.GITHUB_TOKEN;
              const res = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/issues/${issueN}/media`,
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/octet-stream',
                  },
                  body: content,
                },
              );
              if (!res.ok) {
                const txt = await res.text();
                throw new Error(`HTTP ${res.status} ${res.statusText}: ${txt.slice(0, 200)}`);
              }
              return await res.json();  // { url, name, type, size, dimensions, ... }
            }

            let issueNumber;
            if (existing) {
              issueNumber = existing.number;
              let comment = `🔁 又失败了 @ run #${runId} (${runUrl})\n\n📊 [报告](${pagesBase}/)\n\n${errorSummary || '详见报告'}`;
              for (const png of screenshots) {
                try {
                  const r = await uploadScreenshot(issueNumber, png);
                  comment += `\n\n![fail](${r.url})`;
                } catch (e) {
                  console.log(`上传截图失败 ${png}: ${e.message}`);
                }
              }
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body: comment,
              });
              console.log(`已存在 issue #${issueNumber}，加 comment（附 ${screenshots.length} 张图）`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title: issueTitle, body: issueBody, labels,
              });
              issueNumber = created.data.number;
              console.log(`新建 issue #${issueNumber}`);

              const mdImages = [];
              for (const png of screenshots) {
                try {
                  const r = await uploadScreenshot(issueNumber, png);
                  const name = path.basename(png);
                  mdImages.push(`![${name}](${r.url})`);
                  console.log(`  上传 ${name} → ${r.url.slice(0, 80)}`);
                } catch (e) {
                  console.log(`上传截图失败 ${png}: ${e.message}`);
                }
              }
              if (mdImages.length > 0) {
                issueBody += `\n\n### Screenshots\n\n${mdImages.join('\n\n')}`;
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber, body: issueBody,
                });
                console.log(`issue #${issueNumber} body 已追加 ${mdImages.length} 张截图`);
              }
            }